name: Update README TOC

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/scripts/update-toc.js"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-toc:
    runs-on: ubuntu-latest
    # 봇 커밋으로 인한 무한 루프 방지
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate TOC
        run: node .github/scripts/update-toc.js

      - name: Commit changes
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "변경 사항 없음"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: README 목차 자동 갱신"
          git push
